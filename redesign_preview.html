<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ViviCast IPTV Redesign Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --safe-x: clamp(46px, 4.8vw, 92px);
        --safe-y: clamp(26px, 4.6vh, 54px);
        --focus: #8ff3ff;
        --surface: rgba(9, 14, 23, 0.62);
        --surface-2: rgba(15, 23, 36, 0.74);
        --line: rgba(255, 255, 255, 0.13);
        --a: rgba(42, 190, 255, 0.48);
        --b: rgba(255, 78, 123, 0.34);
        --progress: 58%;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: #05070c;
        color: #f8fbff;
        font-family: Inter, Roboto, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .ambient {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 76% 18%, var(--a), transparent 34%),
          radial-gradient(circle at 18% 82%, var(--b), transparent 30%),
          linear-gradient(118deg, #05070c 0%, #0a111d 46%, #111827 100%);
        transition: background 420ms ease;
      }

      .ambient::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(5, 7, 12, 0.95) 0%, rgba(5, 7, 12, 0.68) 40%, rgba(5, 7, 12, 0.28) 100%),
          linear-gradient(180deg, rgba(5, 7, 12, 0.08) 0%, rgba(5, 7, 12, 0.75) 100%);
        backdrop-filter: saturate(128%) blur(2px);
      }

      .shell {
        position: relative;
        height: 100vh;
        padding: var(--safe-y) var(--safe-x);
      }

      .frosted {
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 24px 80px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(24px) saturate(128%);
      }

      .frosted-strong {
        background: var(--surface-2);
        border: 1px solid var(--line);
        backdrop-filter: blur(18px) saturate(122%);
      }

      .nav-item,
      .content-row,
      .chip,
      .action {
        transition: transform 170ms ease, background 170ms ease, border-color 170ms ease, box-shadow 170ms ease;
      }

      .nav-item.active,
      .chip.active {
        background: rgba(238, 253, 255, 0.14);
        color: #ffffff;
        border-color: rgba(143, 243, 255, 0.44);
      }

      .content-row.focused {
        transform: scale(1.035);
        background: rgba(238, 253, 255, 0.15);
        border-color: rgba(143, 243, 255, 0.95);
        box-shadow:
          0 0 0 3px rgba(143, 243, 255, 0.26),
          0 0 34px rgba(85, 215, 255, 0.32),
          0 18px 46px rgba(0, 0, 0, 0.42);
        z-index: 4;
      }

      .art {
        background:
          linear-gradient(150deg, rgba(255, 255, 255, 0.20), rgba(255, 255, 255, 0.03)),
          linear-gradient(135deg, var(--a), var(--b));
      }

      .progress {
        background: linear-gradient(90deg, #8ff3ff var(--progress), rgba(255, 255, 255, 0.20) var(--progress));
      }

      .toggle-on {
        background: #8ff3ff;
      }

      .toggle-off {
        background: rgba(255, 255, 255, 0.20);
      }

      .result-scroll {
        scrollbar-width: thin;
        scrollbar-color: rgba(143, 243, 255, 0.45) rgba(255, 255, 255, 0.08);
      }

      .result-scroll::-webkit-scrollbar {
        width: 10px;
      }

      .result-scroll::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
      }

      .result-scroll::-webkit-scrollbar-thumb {
        background: rgba(143, 243, 255, 0.45);
        border-radius: 999px;
      }
    </style>
  </head>

    <div class="ambient"></div>

            </div>

          </header>

          <div id="providerBlock">

                <div class="min-w-0">

                  <h2 id="heroTitle" class="mt-1 max-w-4xl truncate text-6xl font-semibold leading-none">Nightline Europe</h2>

              <div class="mt-7 max-w-4xl">

            </section>

            <section id="detailArea" class="grid grid-cols-[1fr_360px] gap-5"></section>
          </div>
        </section>
      </section>
    </main>

      function row(number, name, subtitle, category, title, description, time, next, progress, a, b, badges, cards) {
        return { number, name, subtitle, category, title, description, time, next, progress, a, b, badges, cards };
      }

      let activeView = "live";
      const navEl = document.querySelector("#nav");
      const listEl = document.querySelector("#contentList");

      function current() {
        return data[activeView];
      }

      function chip(text, active = false) {
        return `<span class="chip ${active ? "active" : ""} rounded-full border border-white/[0.12] bg-white/[0.07] px-3 py-2 text-sm font-semibold text-white/[0.72]">${text}</span>`;
      }

      function statCard(label, value) {
        return `<div class="rounded-2xl border border-white/[0.10] bg-white/[0.06] p-3"><div class="text-xs font-semibold uppercase tracking-[0.16em] text-white/[0.38]">${label}</div><div class="mt-1 text-xl font-bold">${value}</div></div>`;
      }

      function renderNav() {
        navEl.innerHTML = nav
          .map(([id, icon, label]) => `
            <button data-destination="${id}" class="nav-item ${id === activeView ? "active" : ""} flex w-full items-center gap-4 rounded-3xl border border-transparent px-4 py-4 text-left text-white/[0.72]">
              <span class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-white/[0.08] text-2xl">${icon}</span>
              <span class="whitespace-nowrap text-xl font-semibold">${label}</span>
            </button>
          `)
          .join("");

        document.querySelectorAll("[data-destination]").forEach((button) => {
          button.addEventListener("click", () => {
            activeView = button.dataset.destination;
            render();
          });
        });
      }

      function renderMaster() {
        const view = current();
        document.querySelector("#eyebrow").textContent = view.eyebrow;
        document.querySelector("#title").textContent = view.title;
        document.querySelector("#eyebrow").style.display = activeView === "search" ? "none" : "";
        document.querySelector("#counter").textContent = view.counter;
        document.querySelector("#counter").style.display = activeView === "search" ? "none" : "";
        document.querySelector("#providerBlock").style.display = activeView === "search" ? "none" : "";
        document.querySelector("#categoryBlock").style.display = activeView === "search" ? "none" : "";
        document.querySelector("#quickStats").style.display = activeView === "search" ? "none" : "";
        document.querySelector("#providers").innerHTML = view.providers.map((value, index) => chip(value, index === 0)).join("");
        document.querySelector("#categories").innerHTML = view.categories.map((value, index) => chip(value, index === 1 || (activeView === "settings" && index === view.focusedIndex))).join("");
        document.querySelector("#quickStats").innerHTML = view.stats.map(([label, value]) => statCard(label, value)).join("");
        if (activeView === "search") {
          listEl.innerHTML = `
            <div class="content-row focused rounded-[30px] border border-cyan-200/[0.80] bg-white/[0.10] p-5">
              <div class="mb-3 text-xs font-semibold uppercase tracking-[0.20em] text-cyan-100/[0.72]">Search field</div>
              <div class="flex items-center gap-4">
                <span class="grid h-14 w-14 place-items-center rounded-2xl bg-white/[0.12] text-2xl">⌕</span>
                <div>
                  <div class="text-4xl font-semibold leading-tight">night</div>
                  <div class="mt-2 text-lg text-white/[0.56]">Searches Movies, Series and TV Guide programmes</div>
                </div>
              </div>
            </div>
            <div class="mt-6">
              <div class="mb-3 flex items-center justify-between">
                <p class="text-xs font-semibold uppercase tracking-[0.20em] text-white/[0.42]">Search history</p>
                <span class="text-sm font-semibold text-cyan-100/[0.62]">Clear</span>

                ${[
                  "night",
                  "champions",
                  "harbor",
                  "kids",
                  "dolby",
                  "crime",
                  "news",
                  "4k movies",
                  "episode 5",
                  "football",
                  "documentary",
                  "german audio"
                ].slice(0, 12).map((term, index) => `
                  <button class="flex w-full items-center justify-between rounded-2xl border border-white/[0.10] bg-white/[0.055] px-4 py-3 text-left">
                    <span class="truncate text-lg font-semibold">${term}</span>
                    <span class="text-sm text-white/[0.42]">${index < 3 ? "recent" : "history"}</span>
                  </button>
                `).join("")}
              </div>
            </div>
          `;
          return;
        }
        listEl.innerHTML = view.items.map((entry, index) => {
          const focused = index === view.focusedIndex;
          return `
            <button data-index="${index}" class="content-row ${focused ? "focused" : ""} flex w-full items-center gap-4 rounded-3xl border border-white/[0.10] bg-white/[0.055] p-4 text-left">
              <span class="grid h-14 w-14 place-items-center rounded-2xl bg-white/[0.12] text-xl font-black">${entry.number}</span>
              <span class="min-w-0 flex-1">
                <span class="block truncate text-2xl font-semibold">${entry.name}</span>
                <span class="mt-1 block truncate text-lg text-white/[0.58]">${entry.subtitle}</span>
              </span>
              <span class="rounded-full border border-white/[0.12] px-3 py-1 text-sm font-medium text-white/[0.62]">${entry.category}</span>
            </button>
          `;
        }).join("");

        document.querySelectorAll("[data-index]").forEach((rowEl) => {
          rowEl.addEventListener("click", () => {
            view.focusedIndex = Number(rowEl.dataset.index);
            render();
          });
        });
      }

      function renderHero() {
        const view = current();
        const entry = view.items[view.focusedIndex];
        document.documentElement.style.setProperty("--a", entry.a);
        document.documentElement.style.setProperty("--b", entry.b);
        document.documentElement.style.setProperty("--progress", `${entry.progress}%`);
        if (activeView === "search") {
          renderSearchResults(entry);
          return;
        }
        document.querySelector("#topBar").style.display = "";
        document.querySelector("#heroSection").style.display = "";
        document.querySelector("#detailArea").className = "grid grid-cols-[1fr_360px] gap-5";
        document.querySelector("#topBadges").innerHTML = entry.badges.map((value) => chip(value, false)).join("");
        document.querySelector("#heroArt").textContent = entry.name.slice(0, 2).toUpperCase();
        document.querySelector("#heroMeta").textContent = `${view.eyebrow} · ${entry.category}`;
        document.querySelector("#heroTitle").textContent = entry.title;
        document.querySelector("#heroSub").textContent = `${entry.time} · ${entry.next}`;
        document.querySelector("#heroDescription").textContent = entry.description;
        document.querySelector("#progressLeft").textContent = entry.time.split(" - ")[0] || entry.time;
        document.querySelector("#progressRight").textContent = entry.time.split(" - ")[1] || entry.next;
        document.querySelector("#actions").innerHTML = actionsFor(activeView).map((value, index) => `
          <button class="action ${index === 0 ? "primary" : "bg-white/[0.10] text-white"} rounded-2xl border border-white/[0.15] px-7 py-4 text-xl font-bold shadow-2xl">${value}</button>
        `).join("");
        document.querySelector("#detailArea").innerHTML = detailFor(view, entry);
      }

      function renderSearchResults(entry) {
        document.querySelector("#topBar").style.display = "none";
        document.querySelector("#heroSection").style.display = "none";
        document.querySelector("#detailArea").className = "result-scroll min-h-0 flex-1 overflow-y-auto pr-3";
        document.querySelector("#detailArea").innerHTML = `
          <div class="space-y-5 pb-2">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm font-semibold uppercase tracking-[0.22em] text-cyan-100/[0.70]">All results</p>
                <h2 class="mt-1 text-4xl font-semibold">night</h2>
              </div>
              <div class="rounded-full border border-white/[0.15] bg-white/[0.08] px-4 py-2 text-base font-semibold text-white/[0.76]">18 matches</div>
            </div>
            ${searchPosterGroup("Movies", ["Night Harbor", "Midnight Signal", "Northern Lights", "After Night"], ["4K · Thriller", "2025 · Crime", "HDR · Drama", "Resume 32m"], ["All VOD", "Cinema Hub", "Xtream Home", "Kids Pack"])}
            ${searchPosterGroup("Series", ["Night Shift", "Metro Nights", "Dark Meridian", "Orbit Crew"], ["S2 E4", "3 seasons", "New episode", "Kids · S3"], ["All series", "Drama Pack", "Xtream Home", "Kids Pack"])}
            ${searchGuideGroup(["All guide", "Xtream Home", "Sports Plus", "Kids Pack"])}
          </div>
        `;
      }

      function providerBadges(providers) {
        return providers.map((provider, index) => `
          <span class="${index === 0 ? "border-cyan-200/[0.70] bg-cyan-200/[0.12] text-white" : "border-white/[0.12] bg-white/[0.07] text-white/[0.68]"} rounded-full border px-3 py-1 text-sm font-semibold">${provider}</span>
        `).join("");
      }

      function searchPosterGroup(title, names, meta, providers) {
        return `
          <section class="frosted-strong rounded-3xl p-5">
            <div class="mb-4 flex items-center justify-between gap-4">
              <h3 class="text-2xl font-bold">${title}</h3>
              <div class="flex flex-wrap justify-end gap-2">${providerBadges(providers)}</div>
            </div>
            <div class="grid grid-cols-4 gap-4">
              ${names.map((name, index) => `
                <div class="${index === 0 ? "ring-2 ring-cyan-200" : ""} rounded-3xl border border-white/[0.10] bg-white/[0.06] p-3">
                  <div class="art grid aspect-[2/3] place-items-center rounded-2xl text-3xl font-black">${name.slice(0, 2).toUpperCase()}</div>
                  <div class="mt-3 truncate text-lg font-bold">${name}</div>
                  <div class="mt-1 truncate text-sm text-white/[0.56]">${meta[index]}</div>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }

      function searchListGroup(title, names, meta, providers) {
        return `
          <section class="frosted-strong rounded-3xl p-5">
            <div class="mb-4 flex items-center justify-between gap-4">
              <h3 class="text-2xl font-bold">${title}</h3>
              <div class="flex flex-wrap justify-end gap-2">${providerBadges(providers)}</div>
            </div>
            ${names.map((name, index) => `
              <div class="${index === 0 ? "border-cyan-200/[0.72] bg-cyan-200/[0.10]" : "border-white/[0.10] bg-white/[0.05]"} mb-3 rounded-2xl border p-3">
                <div class="truncate text-lg font-bold">${name}</div>
                <div class="mt-1 truncate text-sm text-white/[0.56]">${meta[index]}</div>
              </div>
            `).join("")}
          </section>
        `;
      }

      function searchGuideGroup(providers) {
        const programmes = [
          ["NX", "Nightline Europe", "NordX News", "Today 20:00 - 21:00"],
          ["AP", "The Glass Harbor", "Atlas Premiere", "Today 19:45 - 21:35"],
          ["ST", "Late Night Mix", "Studio Live", "Today 22:00 - 23:30"],
          ["DC", "Northern Report", "Doc Central", "Tomorrow 18:30 - 19:15"],
          ["SP", "Night Race Qualifying", "Sports Plus", "June 26, 2026 21:00 - 22:15"]
        ];
        return `
          <section class="frosted-strong rounded-3xl p-5">
            <div class="mb-4 flex items-center justify-between gap-4">
              <h3 class="text-2xl font-bold">TV Guide</h3>
              <div class="flex flex-wrap justify-end gap-2">${providerBadges(providers)}</div>
            </div>
            ${programmes.map(([logo, title, channel, time], index) => `
              <div class="${index === 0 ? "border-cyan-200/[0.72] bg-cyan-200/[0.10]" : "border-white/[0.10] bg-white/[0.05]"} mb-3 flex items-center gap-4 rounded-2xl border p-3">
                <span class="grid h-14 w-14 shrink-0 place-items-center rounded-2xl bg-white/[0.12] text-lg font-black">${logo}</span>
                <span class="min-w-0 flex-1">
                  <span class="block truncate text-lg font-bold">${title}</span>
                  <span class="mt-1 block truncate text-sm text-white/[0.56]">${channel}</span>
                </span>
                <span class="shrink-0 rounded-full border border-white/[0.12] bg-white/[0.07] px-3 py-2 text-sm font-semibold text-white/[0.72]">${time}</span>
              </div>
            `).join("")}
          </section>
        `;
      }

      function actionsFor(view) {
        if (view === "live") return ["Watch", "Guide", "Favorite", "Audio"];
        if (view === "movies") return ["Resume", "Trailer", "Favorite", "More"];
        if (view === "series") return ["Resume", "Episodes", "Season", "Favorite"];
        if (view === "settings") return ["Open", "Refresh", "Add source", "Reset"];
        return ["Search", "Voice", "Filters"];
      }

      function detailFor(view, entry) {
        const cards = [0, 2, 4].map((index) => statCard(entry.cards[index], entry.cards[index + 1])).join("");
        if (view.layout === "live") {
          return `
            <div class="grid grid-cols-3 gap-3">${cards}</div>
            <div class="frosted-strong rounded-3xl p-5">
              <div class="mb-3 text-sm font-semibold uppercase tracking-[0.20em] text-white/[0.42]">Mini EPG</div>
              ${["Now · " + entry.title, entry.next, "Later: Late Edition"].map((value, index) => `
                <div class="${index === 0 ? "border-cyan-200/[0.80] bg-cyan-200/[0.10]" : "border-white/[0.10] bg-white/[0.05]"} mb-2 rounded-2xl border p-3">
                  <div class="text-lg font-bold">${value}</div>
                  <div class="mt-1 text-sm text-white/[0.54]">${index === 0 ? entry.time : "21:00 - 22:00"}</div>
                </div>
              `).join("")}
            </div>
          `;
        }
        if (view.layout === "movies") {
          return `
            <div class="grid grid-cols-3 gap-3">${cards}</div>
            <div class="frosted-strong rounded-3xl p-5">
              <div class="mb-3 text-sm font-semibold uppercase tracking-[0.20em] text-white/[0.42]">Rows preview</div>
              <div class="grid grid-cols-3 gap-3">
                ${["4K", "New", "Resume", "Action", "Family", "Docs"].map((value, index) => `<div class="art rounded-2xl p-4 text-lg font-black ${index === 0 ? "ring-2 ring-cyan-200" : ""}">${value}</div>`).join("")}
              </div>
            </div>
          `;
        }
        if (view.layout === "series") {
          return `
            <div class="grid grid-cols-3 gap-3">${cards}</div>
            <div class="frosted-strong rounded-3xl p-5">
              <div class="mb-3 flex gap-2">${["S1", "S2", "S3"].map((value, index) => chip(value, index === 1)).join("")}</div>
              ${["E4 · Current episode", "E5 · Next episode", "E6 · Available"].map((value, index) => `
                <div class="${index === 0 ? "border-cyan-200/[0.80] bg-cyan-200/[0.10]" : "border-white/[0.10] bg-white/[0.05]"} mb-2 rounded-2xl border p-3">
                  <div class="text-lg font-bold">${value}</div>
                  <div class="mt-1 text-sm text-white/[0.54]">42 min · HD · Resume-aware</div>
                </div>
              `).join("")}
            </div>
          `;
        }
        if (view.layout === "settings") {
          return `
            <div class="grid grid-cols-3 gap-3">${cards}</div>
            <div class="frosted-strong rounded-3xl p-5">
              <div class="mb-3 text-sm font-semibold uppercase tracking-[0.20em] text-white/[0.42]">Controls</div>
              ${[
                ["Visible in main nav", true],
                ["Auto refresh", true],
                ["Use compact overlay", false]
              ].map(([label, enabled]) => `
                <div class="mb-3 flex items-center justify-between rounded-2xl border border-white/[0.10] bg-white/[0.05] p-3">
                  <span class="text-lg font-semibold">${label}</span>
                  <span class="${enabled ? "toggle-on" : "toggle-off"} flex h-8 w-14 items-center rounded-full p-1">
                    <span class="h-6 w-6 rounded-full bg-slate-950 ${enabled ? "ml-6" : ""}"></span>
                  </span>
                </div>
              `).join("")}
            </div>
          `;
        }
        return `
          <div class="grid grid-cols-3 gap-3">${cards}</div>
          <div class="frosted-strong rounded-3xl p-5">
            <div class="mb-3 text-sm font-semibold uppercase tracking-[0.20em] text-white/[0.42]">Visual result groups</div>
            ${["Live channels", "Movies", "Series episodes"].map((value) => `<div class="mb-2 rounded-2xl border border-white/[0.10] bg-white/[0.05] p-3 text-lg font-bold">${value}</div>`).join("")}
          </div>
        `;
      }

      function render() {
        renderNav();
        renderMaster();
        renderHero();
      }

      window.addEventListener("keydown", (event) => {
        const view = current();
        if (event.key === "ArrowDown") view.focusedIndex = Math.min(view.items.length - 1, view.focusedIndex + 1);
        if (event.key === "ArrowUp") view.focusedIndex = Math.max(0, view.focusedIndex - 1);
        if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
          const order = nav.map(([id]) => id);
          const next = order.indexOf(activeView) + (event.key === "ArrowRight" ? 1 : -1);
          activeView = order[Math.max(0, Math.min(order.length - 1, next))];
        }
        render();
      });

      render();
    </script>
  </body>
</html>
